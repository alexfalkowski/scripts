version: 2.1

commands:
  sync-submodules:
    steps:
      - run: git submodule sync
      - run: git submodule update --init
  checkout-submodules:
    steps:
      - checkout:
          method: blobless
      - sync-submodules

executors:
  ruby:
    docker:
      - image: alexfalkowski/ruby:3.23
  release:
    docker:
      - image: alexfalkowski/release:8.25

jobs:
  lint:
    executor: ruby
    steps:
      - checkout-submodules
      - restore_cache:
          name: restore deps
          keys:
            - scripts-ruby-cache-{{ checksum "Gemfile.lock" }}
            - scripts-ruby-cache-
      - run: make dep
      - run: make clean-dep
      - save_cache:
          name: save deps
          key: scripts-ruby-cache-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor
      - run: make scripts-lint
      - run: make lint
      - run: make sec
    resource_class: arm.large
  sync:
    executor: release
    steps:
      - checkout-submodules
      - run: make sync push
    resource_class: arm.large
  version:
    executor: release
    steps:
      - checkout-submodules
      - run: version
      - run: package
    resource_class: arm.large
  wait-all:
    executor: ruby
    steps:
      - run: echo "all applicable jobs finished"
    resource_class: arm.large

workflows:
  scripts:
    jobs:
      - lint
      - sync:
          requires:
            - lint
          filters:
            branches:
              ignore: master
      - version:
          context: gh
          serial-group: << pipeline.project.slug >>/version
          requires:
            - lint
          filters:
            branches:
              only: master
      # CircleCI ignores filtered-out required jobs, so this waits for
      # lint+version on master and lint+sync on non-master branches.
      - wait-all:
          requires:
            - lint
            - sync
            - version
