# Read by `ai`. Each kind configures the Codex and Claude model/reasoning
# level plus its prompt preamble. Find/audit and implement/fix skills use
# separate profiles so their model choices remain explicit.
#
# Use "-" as a kind's preamble when it should not invoke a provider skill.
#
# `default` configures any kind that has no entry of its own here but matches
# a skill directory under bin/skills/<kind>, so new shared skills work with
# `ai` without editing this file.
profiles:
  code: &code
    codex:
      model: gpt-5.6-terra
      reasoning: high
    claude:
      model: sonnet
      effort: high
    preamble: "-"
  find: &find
    codex:
      model: gpt-5.6-sol
      reasoning: high
    claude:
      model: opus
      effort: high
    preamble: with agents and a goal
  implement: &implement
    codex:
      model: gpt-5.6-terra
      reasoning: high
    claude:
      model: sonnet
      effort: high
    preamble: with agents and a goal
kinds:
  code: *code
  code-issues-find: *find
  code-issues-implement: *implement
  doc-gaps-audit: *find
  doc-gaps-fix: *implement
  feature-gaps-find: *find
  feature-gaps-implement: *implement
  project-gaps-find: *find
  project-gaps-implement: *implement
  reliability-gaps-find: *find
  reliability-gaps-implement: *implement
  research:
    codex:
      model: gpt-5.6-terra
      reasoning: xhigh
    claude:
      model: opus
      effort: xhigh
    preamble: "-"
  review-pr:
    codex:
      model: gpt-5.6-terra
      reasoning: high
    claude:
      model: sonnet
      effort: high
    preamble: with agents and a goal
  question:
    codex:
      model: gpt-5.6-luna
      reasoning: medium
    claude:
      model: sonnet
      effort: medium
    preamble: "-"
  test-gaps-find: *find
  test-gaps-implement: *implement
  default: *find
