# Read by `ai`. Each kind configures the Codex and Claude model/reasoning
# level to use, plus mode-specific prompt preambles. `find_preamble` applies
# to ledger-find invocations; `approval_preamble` applies to the `go` approval
# shortcut.
#
# Use "-" as a kind's preamble when it should not invoke a provider skill.
#
# `default` configures any kind that has no entry of its own here but matches
# a skill directory under bin/skills/<kind>, so new shared skills work with
# `ai` without editing this file.
profiles:
  ledger: &ledger
    codex:
      model: gpt-5.6-sol
      reasoning: xhigh
    claude:
      model: opus
      effort: xhigh
    find_preamble: >-
      with agents and a goal. Record confirmed findings in the ledger, update
      .gitignore only if required, report findings or none, then stop—no next
      steps or implementation offers.
    approval_preamble: with agents and a goal
kinds:
  code:
    codex:
      model: gpt-5.6-terra
      reasoning: high
    claude:
      model: sonnet
      effort: high
    preamble: "-"
  code-issues: *ledger
  feature-gaps: *ledger
  project-gaps: *ledger
  reliability-gaps: *ledger
  research:
    codex:
      model: gpt-5.6-terra
      reasoning: xhigh
    claude:
      model: opus
      effort: xhigh
    preamble: "-"
  review-pr:
    codex:
      model: gpt-5.6-terra
      reasoning: high
    claude:
      model: sonnet
      effort: high
    preamble: with agents and a goal
  question:
    codex:
      model: gpt-5.6-luna
      reasoning: medium
    claude:
      model: sonnet
      effort: medium
    preamble: "-"
  test-gaps: *ledger
  default:
    codex:
      model: gpt-5.6-sol
      reasoning: xhigh
    claude:
      model: opus
      effort: xhigh
    preamble: with agents and a goal
    approval_preamble: with agents and a goal
